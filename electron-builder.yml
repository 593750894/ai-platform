appId: com.seedland.seedlandv
productName: SeedLandV
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
  - '!**/*.map'
asarUnpack:
  - resources/**
win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-Setup.${ext}
  shortcutName: SeedLand V
extraResources:
  - from: .env.example
    to: .env.example
